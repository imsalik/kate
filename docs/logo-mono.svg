<svg width="500" height="322" viewBox="90 18 500 322" role="img" xmlns="http://www.w3.org/2000/svg">
<title>kate logo (mono)</title>
<desc>A white seven-spoke Kubernetes helm whose hub is a terminal command prompt, set in a near-black app tile above the word kate in monospace with a blinking cursor.</desc>

<rect x="240" y="30" width="200" height="200" rx="38" fill="#0A0A0A" stroke="#FFFFFF" stroke-width="2.5"/>

<path d="M 340 62 L 393.2 87.6 L 406.3 145.1 L 369.5 191.3 L 310.5 191.3 L 273.7 145.1 L 286.8 87.6 Z" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linejoin="round"/>

<g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round">
<line x1="340" y1="108" x2="340" y2="66"/>
<line x1="357.2" y1="116.3" x2="389" y2="89.5"/>
<line x1="361.4" y1="134.9" x2="402" y2="143.8"/>
<line x1="349.5" y1="149.8" x2="367" y2="187"/>
<line x1="330.5" y1="149.8" x2="313" y2="187"/>
<line x1="318.6" y1="134.9" x2="278" y2="143.8"/>
<line x1="322.8" y1="116.3" x2="291" y2="89.5"/>
</g>

<g fill="#FFFFFF">
<circle cx="340" cy="62" r="5.5"/>
<circle cx="393.2" cy="87.6" r="5.5"/>
<circle cx="406.3" cy="145.1" r="5.5"/>
<circle cx="369.5" cy="191.3" r="5.5"/>
<circle cx="310.5" cy="191.3" r="5.5"/>
<circle cx="273.7" cy="145.1" r="5.5"/>
<circle cx="286.8" cy="87.6" r="5.5"/>
</g>

<rect x="320" y="110" width="40" height="40" rx="9" fill="#0A0A0A" stroke="#FFFFFF" stroke-width="3"/>
<text x="338" y="139" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="#FFFFFF">&gt;</text>

<text x="333" y="292" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="60" font-weight="500" letter-spacing="2" fill="#E5E5E5">kate</text>
<rect x="412" y="251" width="20" height="44" fill="#FFFFFF">
<animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
</rect>

<text x="340" y="328" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14" fill="#777777">kubernetes, from the terminal</text>
</svg>
